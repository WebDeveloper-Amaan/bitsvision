services:
  - type: web
    name: bitsvision-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
